esphome:
  name: mic-front
  friendly_name: mic-front

external_components:
  - source: github://lucize/esphome-audio-rtsp@main
    components: [rtsp_audio]
    refresh: 0s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  logs:
    rtsp_audio: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: mic-front Fallback Hotspot
    password: !secret fallback_ap_password

captive_portal:

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO25   # INMP441 WS / LRCLK
    i2s_bclk_pin: GPIO26    # INMP441 SCK / BCLK

microphone:
  - platform: i2s_audio
    id: inmp441_mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO27     # INMP441 SD / DOUT
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left           # INMP441 L/R wiring; try right if silent

rtsp_audio:
  microphone: inmp441_mic
  port: 8554
  audio_channel: 0          # microphone output channel index; mono mic = 0
  gain_factor: 4            # 1-64 integer gain applied before RTP packetization
  rtp_payload_type: 96
  packet_ms: 20
  buffer_ms: 200
  debug: true
  status_interval: 10s
